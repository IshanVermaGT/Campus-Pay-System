<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Create Account | Campus Payment</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-y: auto;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #764ba2, #667eea);
        }

        /* Animated Background - Floating Particles */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255,255,255,0.15) 2%, transparent 2.5%),
                radial-gradient(circle at 90% 40%, rgba(255,255,255,0.12) 1.5%, transparent 2%),
                radial-gradient(circle at 30% 80%, rgba(255,255,255,0.1) 2.5%, transparent 3%),
                radial-gradient(circle at 70% 60%, rgba(255,255,255,0.08) 1.8%, transparent 2.3%);
            background-size: 80px 80px, 100px 100px, 120px 120px, 90px 90px;
            background-position: 0 0, 0 0, 0 0, 0 0;
            animation: floatParticles 25s linear infinite;
            pointer-events: none;
        }

        @keyframes floatParticles {
            0% {
                background-position: 0 0, 0 0, 0 0, 0 0;
            }
            100% {
                background-position: 80px 80px, 100px 100px, 120px 120px, 90px 90px;
            }
        }

        /* Moving gradient background overlay */
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, 
                rgba(102, 126, 234, 0.25) 0%, 
                rgba(118, 75, 162, 0.25) 50%,
                rgba(102, 126, 234, 0.25) 100%);
            background-size: 200% 200%;
            animation: gradientMove 8s ease infinite;
            pointer-events: none;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        .register-container {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            animation: containerGlow 0.8s ease-out;
            z-index: 1;
        }

        /* MOVING GRADIENT BORDER */
        .register-container::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            background: linear-gradient(135deg, 
                #667eea, 
                #764ba2, 
                #8b5cf6, 
                #6366f1, 
                #a855f7, 
                #7c3aed,
                #667eea);
            background-size: 400% 400%;
            border-radius: 27px;
            z-index: -2;
            animation: borderMove 4s ease infinite;
            opacity: 0.8;
        }

        @keyframes borderMove {
            0% {
                background-position: 0% 50%;
                opacity: 0.7;
            }
            50% {
                background-position: 100% 50%;
                opacity: 1;
            }
            100% {
                background-position: 0% 50%;
                opacity: 0.7;
            }
        }

        .register-container:hover::before {
            animation: borderMove 2s ease infinite;
            opacity: 1;
        }

        @keyframes containerGlow {
            0% {
                opacity: 0;
                transform: scale(0.95) translateY(30px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .register-header {
            padding: 40px 40px 20px;
            text-align: center;
            animation: fadeInDown 0.6s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 32px;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            animation: iconBounce 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes iconBounce {
            0% {
                transform: scale(0) rotate(-180deg);
                opacity: 0;
            }
            50% {
                transform: scale(1.1) rotate(5deg);
            }
            100% {
                transform: scale(1) rotate(0);
                opacity: 1;
            }
        }

        .register-header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }

        .register-header p {
            color: #666;
            font-size: 16px;
            animation: fadeInUp 0.6s ease-out 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-form {
            padding: 20px 40px 40px;
            animation: fadeIn 0.8s ease-out 0.4s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            margin-bottom: 20px;
            animation: slideInRight 0.5s ease-out;
            animation-fill-mode: both;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Staggered animations for form fields */
        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.15s; }
        .form-group:nth-child(3) { animation-delay: 0.2s; }
        .form-group:nth-child(4) { animation-delay: 0.25s; }
        .form-group:nth-child(5) { animation-delay: 0.3s; }
        .form-group:nth-child(6) { animation-delay: 0.35s; }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 16px;
            z-index: 2;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            transform: scale(1.01);
        }

        .form-group input:focus + .input-icon {
            color: #667eea;
            transform: translateY(-50%) scale(1.1);
        }

        .register-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 20px 0 24px;
            position: relative;
            overflow: hidden;
            animation: buttonPulse 0.8s ease-out 0.6s both;
        }

        @keyframes buttonPulse {
            0% {
                opacity: 0;
                transform: scale(0.95);
            }
            50% {
                transform: scale(1.02);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .register-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .register-btn:hover::before {
            left: 100%;
        }

        .register-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
        }

        .login-link {
            text-align: center;
            color: #666;
            font-size: 15px;
            animation: fadeInUp 0.6s ease-out 0.7s both;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
        }

        .login-link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .login-link a:hover::after {
            width: 100%;
        }

        .error-message {
            background: #fee;
            color: #e74c3c;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            border: 1px solid #fcc;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            animation: fadeInUp 0.4s ease;
        }

        .password-hint {
            font-size: 12px;
            color: #999;
            margin-top: 6px;
        }

        .footer {
            text-align: center;
            padding: 20px 40px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 13px;
            animation: fadeIn 0.6s ease-out 0.8s both;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <div class="user-icon">👤</div>
            <h1>Create Campus Account</h1>
            <p>Join the secure campus payment portal</p>
        </div>

        <div class="register-form">
            <div id="message" style="display: none;"></div>

            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Roll Number</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🎓</span>
                            <input type="text" id="rollNumber" placeholder="e.g., STU001" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Full Name</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="name" placeholder="John Doe" required>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <div class="input-wrapper">
                            <span class="input-icon">📧</span>
                            <input type="email" id="email" placeholder="you@university.edu" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Phone</label>
                        <div class="input-wrapper">
                            <span class="input-icon">📱</span>
                            <input type="tel" id="phone" placeholder="9876543210" required>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Course</label>
                        <div class="input-wrapper">
                            <span class="input-icon">📚</span>
                            <input type="text" id="course" placeholder="e.g., B.Tech CSE">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Batch</label>
                        <div class="input-wrapper">
                            <span class="input-icon">📅</span>
                            <input type="text" id="batch" placeholder="e.g., 2024-2028">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔑</span>
                        <input type="password" id="password" placeholder="Minimum 6 characters" required>
                    </div>
                    <div class="password-hint">Password must be at least 6 characters long</div>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✓</span>
                        <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
                    </div>
                </div>

                <button type="submit" class="register-btn" id="registerBtn">
                    Create Account
                </button>
            </form>

            <div class="login-link">
                Already have an account? <a href="login.html">Sign in here</a>
            </div>
        </div>

        <div class="footer">
            © 2026 Campus Payment System • Secure Payment Portal
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const registerBtn = document.getElementById('registerBtn');
            const messageDiv = document.getElementById('message');

            if (password !== confirmPassword) {
                messageDiv.textContent = 'Passwords do not match!';
                messageDiv.className = 'error-message';
                messageDiv.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                messageDiv.textContent = 'Password must be at least 6 characters!';
                messageDiv.className = 'error-message';
                messageDiv.style.display = 'block';
                return;
            }

            const studentData = {
                rollNumber: document.getElementById('rollNumber').value,
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                course: document.getElementById('course').value,
                batch: document.getElementById('batch').value,
                password: password
            };

            try {
                registerBtn.disabled = true;
                registerBtn.textContent = 'Creating account...';
                messageDiv.style.display = 'none';

                const response = await fetch('http://localhost:5000/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(studentData)
                });

                const data = await response.json();

                if (data.success) {
                    messageDiv.textContent = '✅ Account created successfully! Redirecting to login...';
                    messageDiv.className = 'success-message';
                    messageDiv.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    messageDiv.textContent = data.message || 'Registration failed';
                    messageDiv.className = 'error-message';
                    messageDiv.style.display = 'block';
                }

            } catch (error) {
                messageDiv.textContent = 'Connection error. Please try again.';
                messageDiv.className = 'error-message';
                messageDiv.style.display = 'block';
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
