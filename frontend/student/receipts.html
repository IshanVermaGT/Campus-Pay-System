<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Receipts | Campus Payment</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f7fb;
            padding: 40px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
        }

        .back-btn {
            padding: 10px 20px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #667eea;
            color: white;
        }

        .receipts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .receipt-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease;
            border: 1px solid #eee;
        }

        .receipt-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.1);
        }

        .receipt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f3ff;
        }

        .receipt-number {
            font-size: 18px;
            font-weight: 700;
            color: #667eea;
        }

        .receipt-date {
            color: #999;
            font-size: 14px;
        }

        .receipt-details {
            margin-bottom: 20px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
        }

        .detail-label {
            color: #666;
            font-weight: 500;
        }

        .detail-value {
            color: #333;
            font-weight: 600;
        }

        .amount-value {
            color: #27ae60;
            font-size: 18px;
        }

        .download-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .download-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .download-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #999;
        }

        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 20px;
        }

        .empty-state span {
            font-size: 64px;
            display: block;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state p {
            color: #999;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .empty-state a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .error-message {
            background: #fee;
            color: #e74c3c;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 My Receipts</h1>
            <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>
        </div>

        <div id="receiptsContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading your receipts...</p>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        // Check authentication
        if (!requireAuth()) {
            // redirecting...
        }

        const user = getCurrentUser();

        async function loadReceipts() {
            try {
                const data = await apiCall('/student/receipts');
                console.log('📊 Receipts data:', data); // Debug: see the structure
                
                const container = document.getElementById('receiptsContainer');
                
                if (!data.receipts || data.receipts.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <span>🧾</span>
                            <p>No receipts found yet</p>
                            <p>Make a payment to generate your first receipt!</p>
                            <a href="dashboard.html">Go to Dashboard →</a>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = `
    <div class="receipts-grid">
        ${data.receipts.map(receipt => {
            // Use the receipt's own ID, not the transaction ID
            const receiptId = receipt._id;
            console.log('Receipt ID:', receiptId); // Debug
            
            return `
            <div class="receipt-card">
                <div class="receipt-header">
                    <span class="receipt-number">#${receipt.receiptNumber}</span>
                    <span class="receipt-date">${new Date(receipt.createdAt).toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric'
                    })}</span>
                </div>
                <div class="receipt-details">
                    <div class="detail-row">
                        <span class="detail-label">Student:</span>
                        <span class="detail-value">${receipt.studentName}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Roll Number:</span>
                        <span class="detail-value">${receipt.studentRollNumber}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Amount:</span>
                        <span class="detail-value amount-value">₹${receipt.amount.toLocaleString()}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Payment ID:</span>
                        <span class="detail-value">${receipt.razorpayPaymentId ? receipt.razorpayPaymentId.slice(0, 15) + '...' : 'N/A'}</span>
                    </div>
                </div>
                <button class="download-btn" onclick="downloadReceipt('${receiptId}')">
                    ⬇️ Download PDF
                </button>
            </div>
        `}).join('')}
    </div>
`;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('receiptsContainer').innerHTML = `
                    <div class="error-message">
                        ❌ Failed to load receipts. Please try again.
                    </div>
                `;
            }
        }

        async function downloadReceipt(receiptId) {
    try {
        console.log('📄 Receipt ID received:', receiptId);
        
        if (!receiptId || receiptId === 'undefined' || receiptId === 'null') {
            console.error('❌ Invalid receipt ID');
            alert('❌ Invalid receipt ID');
            return;
        }

        const btn = event?.target;
        const originalText = btn?.textContent;
        
        if (btn) {
            btn.disabled = true;
            btn.textContent = '⏳ Downloading...';
        }

        const token = localStorage.getItem('token');
        
        if (!token) {
            alert('❌ Session expired. Please login again.');
            window.location.href = '../login.html';
            return;
        }

        // Use the receipt ID in the URL
        const url = `http://localhost:5000/api/student/receipts/${receiptId}/download`;
        console.log('📡 Fetching:', url);
        
        const response = await fetch(url, {
            method: 'GET',
            headers: {
                'x-auth-token': token,
                'Accept': 'application/pdf'
            }
        });

        if (!response.ok) {
            if (response.status === 401) {
                alert('❌ Session expired. Please login again.');
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '../login.html';
                return;
            }
            
            const errorText = await response.text();
            console.error('Server response:', errorText);
            throw new Error(`Download failed (${response.status})`);
        }

        const blob = await response.blob();
        console.log('✅ Received blob of size:', blob.size, 'bytes');
        
        if (blob.size === 0) {
            throw new Error('Received empty file');
        }

        // Create download link
        const url_blob = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url_blob;
        a.download = `receipt-${receiptId}.pdf`;
        document.body.appendChild(a);
        a.click();
        
        // Cleanup
        setTimeout(() => {
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url_blob);
        }, 100);

        console.log('✅ Download initiated successfully');

    } catch (error) {
        console.error('❌ Receipt download error:', error);
        alert('❌ Failed to download receipt: ' + error.message);
    } finally {
        const btn = event?.target;
        if (btn) {
            btn.disabled = false;
            btn.textContent = originalText || '⬇️ Download PDF';
        }
    }
}
        // Load receipts on page load
        loadReceipts();
    </script>
</body>
</html>
